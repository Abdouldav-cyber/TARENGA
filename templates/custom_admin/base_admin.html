{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Admin - Teranga</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-body: #f1f5f9;
            --bg-sidebar: #0B2149;
            --text-sidebar: #cbd5e1;
            --primary: #1565c0;
            --success: #10b981;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { display: flex; min-height: 100vh; background-color: var(--bg-body); color: #1e293b; }
        
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            box-shadow: 4px 0 10px rgba(0,0,0,0.05);
        }
        .sidebar-brand { font-size: 1.5rem; font-weight: 700; padding: 0 20px 30px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .nav-item {
            padding: 15px 25px;
            color: var(--text-sidebar);
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left: 4px solid var(--primary);
        }
        
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        /* Stats Cards */
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
        .stat-card h3 { color: #64748b; font-size: 0.9rem; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: #0f172a; }
        
        /* Tables */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        th, td { padding: 15px 20px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; color: #475569; font-size: 0.9rem; text-transform: uppercase; }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .badge-success { background: #d1fae5; color: #047857; }
        .badge-danger { background: #fee2e2; color: #b91c1c; }
        
        .action-btn { padding: 8px 15px; border-radius: 6px; text-decoration: none; font-size: 0.85rem; font-weight: 600; }
        .btn-validate { background: var(--success); color: white; }

        /* Forms */
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(21,101,192,0.1);
            background: white;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand"><i class="fa-solid fa-shield-halved" style="margin-right: 8px; color: var(--primary);"></i> Téranga Admin</div>
        <a href="{% url 'core:custom_admin_dashboard' %}" class="nav-item {% if request.resolver_match.url_name == 'custom_admin_dashboard' %}active{% endif %}"><i class="fa-solid fa-chart-pie" style="width: 25px;"></i> Vue d'ensemble</a>
        <a href="{% url 'core:custom_admin_participants' %}" class="nav-item {% if request.resolver_match.url_name == 'custom_admin_participants' %}active{% endif %}"><i class="fa-solid fa-users" style="width: 25px;"></i> Participants & Paiements</a>
        <a href="{% url 'core:custom_admin_logistics' %}" class="nav-item {% if request.resolver_match.url_name == 'custom_admin_logistics' %}active{% endif %}"><i class="fa-solid fa-hotel" style="width: 25px;"></i> Logistique & Hôtels</a>
        <a href="{% url 'core:logout_view' %}" class="nav-item" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); color: #ef4444; font-weight: bold;"><i class="fa-solid fa-arrow-right-from-bracket" style="width: 25px;"></i> Se Déconnecter</a>
    </div>
    
    <div class="main-content">
        {% if messages %}
            {% for message in messages %}
                <div style="background: #d1fae5; color: #047857; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: 600;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% block admin_content %}
        {% endblock %}
    </div>
</body>
</html>
